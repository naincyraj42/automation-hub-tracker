<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutoHub">
<meta name="description" content="Enterprise Automation Hub Project Tracker">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>AutoHub — Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#171b26;--bg3:#1e2330;
  --border:#2d3448;--border2:#3d4560;
  --text:#e8eaf2;--text2:#9ba3bd;--text3:#5c6480;
  --green:#22c55e;--gbg:#0d2818;--gt:#4ade80;
  --amber:#f59e0b;--abg:#2a1f06;--at:#fbbf24;
  --red:#ef4444;--rbg:#2a0d0d;--rt:#f87171;
  --blue:#3b82f6;--bbg:#0d1c3a;--bt:#60a5fa;
  --purple:#a855f7;--pbg:#1e0d3a;--pt:#c084fc;
  --pink:#ec4899;--pkbg:#2a0d1e;--pkt:#f472b6;
  --r:8px;--rl:12px;--rx:16px;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* App shell */
.app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;height:100dvh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:calc(12px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{font-size:16px;font-weight:600;letter-spacing:-.02em}
.logo em{color:var(--bt);font-style:normal}
.topbar-right{display:flex;gap:6px;align-items:center}
.db-pill{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text3)}
.db-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.db-dot.off{background:var(--red)}

/* Content area */
.content{overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Bottom nav */
.bnav{background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:calc(8px + var(--safe-bottom));}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;transition:.1s;position:relative}
.bnav-item.on{color:var(--bt)}
.bnav-item svg{width:20px;height:20px}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px}
.mc .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.mc .val{font-size:22px;font-weight:600;margin-top:3px;line-height:1}
.mc .sub{font-size:10px;color:var(--text3);margin-top:2px}
.mc.g .val{color:var(--green)}.mc.r .val{color:var(--red)}.mc.a .val{color:var(--amber)}

/* Search + filters */
.search-bar{padding:0 14px 10px;display:flex;gap:8px}
.search-bar input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;padding:9px 14px;font-family:inherit;outline:none}
.search-bar input:focus{border-color:var(--blue)}
.filter-scroll{display:flex;gap:6px;padding:0 14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.fpill.on{background:var(--bbg);border-color:var(--blue);color:var(--bt)}

/* Project cards */
.cards{padding:0 14px 14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:.1s;-webkit-tap-highlight-color:transparent}
.card:active{background:var(--bg3)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:14px;font-weight:500;line-height:1.3;flex:1}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-owner{font-size:11px;color:var(--text3)}
.card-mc{font-size:11px;font-weight:500}
.card-mc.Y{color:var(--rt)}.card-mc.N{color:var(--gt)}.card-mc.P{color:var(--at)}
.b{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap}
.G{background:var(--gbg);color:var(--gt)}.A{background:var(--abg);color:var(--at)}.R{background:var(--rbg);color:var(--rt)}
.P1{background:var(--rbg);color:var(--rt)}.P2{background:var(--bbg);color:var(--bt)}.P3{background:var(--bg3);color:var(--text3)}
.Live{background:var(--gbg);color:var(--gt)}
.InProgress{background:var(--bbg);color:var(--bt)}
.Blocked{background:var(--rbg);color:var(--rt)}
.OnHold{background:var(--bg3);color:var(--text2)}
.DevComplete{background:var(--pbg);color:var(--pt)}
.UAT{background:var(--pbg);color:var(--pt)}
.Waiting{background:var(--abg);color:var(--at)}
.Pending{background:var(--bg3);color:var(--text3)}
.RequirementGathering{background:var(--pkbg);color:var(--pkt)}
.cat-b{background:var(--bg3);color:var(--text2)}
.empty{text-align:center;padding:48px 14px;color:var(--text3);font-size:13px}

/* Detail sheet */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;backdrop-filter:blur(2px)}
.sheet-bg.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:51;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-bottom:calc(20px + var(--safe-bottom))}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.sheet-hdr{padding:16px 20px;border-bottom:1px solid var(--border)}
.sheet-hdr h2{font-size:16px;font-weight:600;line-height:1.3}
.sheet-body{padding:16px 20px}
.s-sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;padding-top:14px;border-top:1px solid var(--border)}
.s-sec:first-child{margin-top:0;padding-top:0;border:none}
.s-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px}
.s-lbl{font-size:12px;color:var(--text3);flex-shrink:0}
.s-val{font-size:13px;text-align:right}
.blob{background:var(--bg3);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.blk-box{background:var(--rbg);border:1px solid var(--red);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--rt);margin-bottom:10px}

/* Edit form */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin-bottom:4px}
.fg select,.fg input,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;padding:10px 12px;font-family:inherit;outline:none}
.fg textarea{resize:vertical;min-height:72px;line-height:1.5}
.fg select{appearance:none}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
.btn.blue{background:var(--blue);color:#fff}.btn.blue:active{background:#2563eb}
.btn.red{background:var(--rbg);border:1px solid var(--red);color:var(--rt)}

/* Delete modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bottom)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px calc(20px + var(--safe-bottom));width:100%;max-width:500px}
.modal h2{font-size:17px;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:8px}

/* Charts page */
.chart-page{padding:14px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.cc h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bl{font-size:11px;color:var(--text2);width:110px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt2{flex:1;background:var(--bg3);border-radius:3px;height:18px;overflow:hidden}
.bf{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:18px;transition:width .4s}
.bf span{font-size:10px;font-weight:600;color:rgba(255,255,255,.9)}

/* Summary page */
.sum-page{padding:14px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.sc h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.ri{background:var(--rbg);border:1px solid var(--red);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.rn{font-size:13px;font-weight:500;color:var(--rt)}
.rs{font-size:11px;color:var(--text2);margin-top:2px}
.wi{background:var(--abg);border:1px solid var(--amber);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.wn{font-size:13px;font-weight:500;color:var(--at)}

/* Toast */
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(10px);z-index:100;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap;border:1px solid}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--gbg);color:var(--gt);border-color:var(--green)}
.toast.err{background:var(--rbg);color:var(--rt);border-color:var(--red)}

/* ADO */
.ado-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.ado-card.linked{border-left:3px solid #a855f7}
.ado-title{font-size:13px;font-weight:500;margin-bottom:6px}
.ado-meta{font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.ado-state{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.ado-Active,.ado-InProgress{background:var(--bbg);color:var(--bt)}
.ado-New{background:var(--bg3);color:var(--text2)}
.ado-Resolved{background:var(--pbg);color:var(--pt)}
.ado-Blocked{background:var(--rbg);color:var(--rt)}
.ado-Done,.ado-Closed{background:var(--gbg);color:var(--gt)}
.ado-link-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);cursor:pointer;font-family:inherit}
.ado-link-btn:active{background:var(--bg3)}
.ado-linked-tag{font-size:11px;color:#c084fc;background:var(--pbg);padding:2px 8px;border-radius:4px}
/* Loading */
#load{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load p{font-size:13px;color:var(--text3)}

/* Offline banner */
.offline-bar{background:var(--abg);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:12px;color:var(--at);text-align:center;display:none}
.offline-bar.show{display:block}
</style>
</head>
<body>

<div id="load"><div class="spin"></div><p>Loading AutoHub…</p></div>

<div class="app" id="app" style="display:none">
  <div>
    <div class="offline-bar" id="offline-bar">⚡ Offline mode — showing cached data</div>
    <div class="topbar">
      <div class="topbar-left">
        <div style="display:flex;align-items:center;gap:8px">
        <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
          <rect width="100" height="100" rx="20" fill="#0f1117"/>
          <polygon points="50,12 22,62 31,62 38,46 62,46 69,62 78,62" fill="#3b82f6"/>
          <rect x="33" y="42" width="34" height="8" fill="#3b82f6"/>
          <rect x="22" y="62" width="12" height="26" fill="#60a5fa"/>
          <rect x="22" y="72" width="32" height="8" fill="#60a5fa"/>
          <rect x="42" y="62" width="12" height="26" fill="#60a5fa"/>
          <circle cx="80" cy="18" r="8" fill="#3b82f6"/>
        </svg>
        <div class="logo">Auto<em>Hub</em></div>
      </div>
      </div>
      <div class="topbar-right">
        <div class="db-pill"><div class="db-dot" id="db-dot"></div><span id="db-txt">...</span></div>
        <button onclick="load()" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Projects page -->
    <div id="pg-projects">
      <div class="metrics" id="metrics"></div>
      <div class="search-bar">
        <input type="search" id="fq" placeholder="🔍  Search projects, owner, tech…" oninput="filterProjects()">
      </div>
      <div class="filter-scroll" id="filter-pills"></div>
      <div class="cards" id="cards"></div>
    </div>
    <!-- Charts page -->
    <div id="pg-charts" style="display:none"><div class="chart-page" id="chart-page"></div></div>
    <!-- Summary page -->
    <div id="pg-summary" style="display:none"><div class="sum-page" id="sum-page"></div></div>
    <!-- MC page -->
    <div id="pg-devops" style="display:none">
      <div style="padding:14px">
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button onclick="loadADO()" style="flex:1;padding:10px;background:#1e2330;border:1px solid #2d3448;border-radius:8px;color:#e8eaf2;font-size:13px;cursor:pointer;font-family:inherit">
            Fetch from Azure DevOps
          </button>
          <button onclick="syncADO()" style="flex:1;padding:10px;background:#1e0d3a;border:1px solid #a855f7;border-radius:8px;color:#c084fc;font-size:13px;cursor:pointer;font-family:inherit">
            Sync status to tracker
          </button>
        </div>
        <div id="ado-status" style="font-size:12px;color:#5c6480;margin-bottom:10px;padding:8px 12px;background:#1e2330;border-radius:8px;display:none"></div>
        <div id="ado-cards" style="display:flex;flex-direction:column;gap:10px"></div>
      </div>
    </div>
    <div id="pg-mc" style="display:none">
      <div class="metrics" id="mc-metrics"></div>
      <div class="cards" id="mc-cards" style="padding:0 14px 14px"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bnav">
    <button class="bnav-item on" onclick="nav('projects')" id="n-projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Projects
      <span class="bnav-badge" id="total-badge">0</span>
    </button>
    <button class="bnav-item" onclick="nav('charts')" id="n-charts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Charts
    </button>
    <button class="bnav-item" onclick="nav('summary')" id="n-summary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Summary
    </button>
    <button class="bnav-item" onclick="nav('mc')" id="n-mc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      MC Check
      <span class="bnav-badge" id="mc-badge" style="display:none"></span>
    </button>
  </nav>
</div>

<!-- Detail sheet -->
<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr"><h2 id="sheet-title"></h2></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- Delete modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Remove project?</h2>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg3);color:var(--text)" onclick="closeModal()">Cancel</button>
      <button class="btn red" onclick="doDelete()">Remove</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://pqnrozauednnoactkwuq.supabase.co/rest/v1';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbnJvemF1ZWRubm9hY3Rrd3VxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTgzNTgxNywiZXhwIjoyMDk3NDExODE3fQ.7YtNItszfxXdJ2xv2IDDu7mBGyLfc7BXxjFf6Bi2miQ';
const SB_HDR = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

// ── State ─────────────────────────────────────────────────────────────────────
let all = [], activeFilter = '', searchQ = '', activeId = null, delId = null, curPage = 'projects';

// ── Supabase direct calls ─────────────────────────────────────────────────────
async function sbGet(path) {
  const r = await fetch(SUPABASE_URL + path, { headers: SB_HDR });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(id, body) {
  const r = await fetch(`${SUPABASE_URL}/projects?id=eq.${id}`, {
    method: 'PATCH', headers: { ...SB_HDR, 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(id) {
  const r = await fetch(`${SUPABASE_URL}/projects?id=eq.${id}`, {
    method: 'DELETE', headers: SB_HDR
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbInsertAll(projects) {
  const r = await fetch(`${SUPABASE_URL}/projects`, {
    method: 'POST', headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
    body: JSON.stringify(projects)
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const data = await sbGet('/projects?order=project');
    all = data;
    localStorage.setItem('ah_cache', JSON.stringify(all));
    setDb(true);
    document.getElementById('offline-bar').classList.remove('show');
    if (all.length === 0) await seedData();
    render();
  } catch(e) {
    // Fallback to cache
    const cached = localStorage.getItem('ah_cache');
    if (cached) {
      all = JSON.parse(cached);
      document.getElementById('offline-bar').classList.add('show');
      setDb(false);
      render();
      toast('Using cached data', 'err');
    } else {

// ── Seed data directly into Supabase ─────────────────────────────────────────
async function seedData() {
  toast('First run — seeding projects…', 'ok');
  try {
    // Clear first
    await fetch(`${SUPABASE_URL}/projects?id=gte.0`, { method: 'DELETE', headers: SB_HDR });
    // Insert in batches
    const batch1 = SEED_PROJECTS.slice(0, 30);
    const batch2 = SEED_PROJECTS.slice(30);
    await sbInsertAll(batch1);
    await sbInsertAll(batch2);
    all = await sbGet('/projects?order=project');
    localStorage.setItem('ah_cache', JSON.stringify(all));
    setDb(true);
    render();
    toast(`✅ ${all.length} projects loaded!`, 'ok');
  } catch(e) {
    toast('Seed failed: ' + e.message.slice(0,60), 'err');
  }
}

const sc = s => (s||'').replace(/[\s\/\.]+/g,'');
const mcC = m => m==='Yes'?'Y':m==='No'?'N':'P';
const mcLabel = m => m==='Yes'?'MC Required':m==='No'?'No MC':'MC Partial';
const badge = (cls, t) => `<span class="b ${cls}">${t||'—'}</span>`;

// ── Filter ────────────────────────────────────────────────────────────────────
const FILTERS = [
  {id:'all', label:'All'},
  {id:'Live', label:'Live'},
  {id:'Blocked', label:'Blocked 🚨'},
  {id:'In Progress', label:'In Progress'},
  {id:'R', label:'RAG Red 🔴'},
  {id:'A', label:'RAG Amber'},
  {id:'P1', label:'Priority P1'},
  {id:'Yes', label:'MC Required'},
  {id:'On Hold', label:'On Hold'},
];

function buildPills() {
  document.getElementById('filter-pills').innerHTML = FILTERS.map(f =>
    `<button class="fpill ${activeFilter===f.id||(!activeFilter&&f.id==='all')?'on':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join('');
}

function setFilter(id) {
  activeFilter = id === 'all' ? '' : id;
  buildPills();
  filterProjects();
}

function filterProjects() {
  searchQ = (document.getElementById('fq')?.value || '').toLowerCase();
  renderCards();
}

function getFiltered() {
  return all.filter(d => {
    if (searchQ && !d.project.toLowerCase().includes(searchQ) && !d.owner.toLowerCase().includes(searchQ) && !(d.tech||'').toLowerCase().includes(searchQ)) return false;
    if (!activeFilter) return true;
    if (activeFilter === 'Live') return d.status === 'Live';
    if (activeFilter === 'Blocked') return d.status === 'Blocked';
    if (activeFilter === 'In Progress') return d.status === 'In Progress';
    if (activeFilter === 'R') return d.rag === 'R';
    if (activeFilter === 'A') return d.rag === 'A';
    if (activeFilter === 'P1') return d.priority === 'P1';
    if (activeFilter === 'Yes') return d.mc === 'Yes';
    if (activeFilter === 'On Hold') return d.status === 'On Hold';
    return true;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const tot = all.length;
  const live = all.filter(x=>x.status==='Live').length;
  const blk = all.filter(x=>x.status==='Blocked').length;
  const rr = all.filter(x=>x.rag==='R').length;
  const mcy = all.filter(x=>x.mc==='Yes').length;
  const ip = all.filter(x=>x.status==='In Progress').length;

  document.getElementById('total-badge').textContent = tot;
  const mcBadge = document.getElementById('mc-badge');
  mcBadge.textContent = mcy; mcBadge.style.display = mcy ? '' : 'none';

  document.getElementById('metrics').innerHTML = `
    <div class="mc"><div class="lbl">Total</div><div class="val">${tot}</div><div class="sub">projects</div></div>
    <div class="mc g"><div class="lbl">Live</div><div class="val">${live}</div><div class="sub">${Math.round(live/tot*100)}%</div></div>
    <div class="mc r"><div class="lbl">Blocked</div><div class="val">${blk}</div><div class="sub">action needed</div></div>
    <div class="mc r"><div class="lbl">RAG Red</div><div class="val">${rr}</div><div class="sub">high risk</div></div>
    <div class="mc"><div class="lbl">In Progress</div><div class="val">${ip}</div><div class="sub">active</div></div>
    <div class="mc r"><div class="lbl">MC Required</div><div class="val">${mcy}</div><div class="sub">manual check</div></div>

  renderCards();
}

function renderCards() {
  const rows = getFiltered();
  if (!rows.length) {
    document.getElementById('cards').innerHTML = `<div class="empty">No projects match your filter.</div>`;
    return;
  }
  document.getElementById('cards').innerHTML = rows.map(d => `
    <div class="card" onclick="openSheet(${d.id})">
      <div class="card-top">
        <div class="card-name">${d.project}</div>
        <span class="b rag-${d.rag} ${d.rag}">${d.rag||'—'}</span>
      </div>
      <div class="card-badges">
        ${badge(sc(d.status), d.status)}
        ${d.priority ? badge(d.priority, d.priority) : ''}
        ${badge('cat-b', d.category.split('/')[0])}
      </div>
      ${d.blocker ? `<div style="font-size:11px;color:var(--rt);margin-top:4px">⚠ ${d.blocker}</div>` : ''}
      <div class="card-bottom">
        <div class="card-owner">${d.owner}</div>
        <div class="card-mc ${mcC(d.mc)}">${mcLabel(d.mc)}</div>

  `).join('');
}

async function saveSheet(id) {
  const pri = document.getElementById('e-p').value;
  const body = {
    status: document.getElementById('e-s').value,
    rag: document.getElementById('e-r').value,
    priority: pri === '—' ? '' : pri,
    mc: document.getElementById('e-mc').value,
    blocker: document.getElementById('e-b').value,
  };
  try {
    const res = await sbPatch(id, body);
    const idx = all.findIndex(x => x.id === id);
    if (idx !== -1) all[idx] = { ...all[idx], ...body };
    localStorage.setItem('ah_cache', JSON.stringify(all));
    render(); closeSheet();
    toast('Saved ✓');
  } catch(e) { toast('Save failed', 'err'); }
}

function closeSheet() {
  document.getElementById('sheet-bg').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  activeId = null;
}

// ── Delete ────────────────────────────────────────────────────────────────────
function askDelete(id, name) {
  delId = id;
  document.getElementById('modal-msg').textContent = `Remove "${name}" from Supabase? This cannot be undone.`;
  document.getElementById('modal-bg').classList.add('open');
}
async function doDelete() {
  try {
    await sbDelete(delId);
    all = all.filter(x => x.id !== delId);
    localStorage.setItem('ah_cache', JSON.stringify(all));
    if (activeId === delId) closeSheet();
    delId = null; closeModal();
    render(); toast('Project removed');
  } catch(e) { closeModal(); toast('Delete failed', 'err'); }
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); delId = null; }

// ── Charts ────────────────────────────────────────────────────────────────────
function renderCharts() {
  const d = all;
  const sc2={},mc2={Yes:0,Partial:0,No:0},rc={G:0,A:0,R:0},tc={};
  ['Live','In Progress','Dev Complete','UAT','Blocked','On Hold','Waiting','Pending','Requirement Gathering'].forEach(s=>sc2[s]=0);
  d.forEach(x=>{
    if(x.status in sc2) sc2[x.status]++;
    if(x.mc in mc2) mc2[x.mc]++;
    if(x.rag in rc) rc[x.rag]++;
    (x.tech||'').split(',').forEach(t=>{const tt=t.trim();if(tt)tc[tt]=(tc[tt]||0)+1;});
  });
  const cols={'Live':'#22c55e','In Progress':'#3b82f6','Dev Complete':'#a855f7','UAT':'#a855f7','Blocked':'#ef4444','On Hold':'#5c6480','Waiting':'#f59e0b','Pending':'#374151','Requirement Gathering':'#ec4899'};
  const bars=(ents,max,colors,w)=>ents.filter(([,v])=>v>0).map(([k,v])=>`
    <div class="br"><div class="bl" ${w?`style="width:${w}px"`:''}>${k}</div>
    <div class="bt2"><div class="bf" style="width:${Math.round(v/Math.max(max,1)*100)}%;background:${(colors&&colors[k])||'#a855f7'}"><span>${v}</span></div></div></div>`).join('');
  const topT=Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('chart-page').innerHTML=`
    <div class="cc"><h3>By status</h3>${bars(Object.entries(sc2),Math.max(...Object.values(sc2),1),cols)}</div>
    <div class="cc"><h3>Maker-checker split</h3>
      ${bars([['Required',mc2.Yes],['Partial',mc2.Partial],['Not required',mc2.No]],Math.max(mc2.Yes,mc2.Partial,mc2.No,1),{'Required':'#ef4444','Partial':'#f59e0b','Not required':'#22c55e'})}
      <h3 style="margin-top:14px">RAG status</h3>
      ${bars([['Green',rc.G],['Amber',rc.A],['Red',rc.R]],Math.max(rc.G,rc.A,rc.R,1),{'Green':'#22c55e','Amber':'#f59e0b','Red':'#ef4444'})}
    </div>
    <div class="cc"><h3>Top technologies</h3>${bars(topT,topT[0]?.[1]||1,null)}</div>`;
}

let adoItems = [];

async function loadADO() {
  const status = document.getElementById('ado-status');
  const cards  = document.getElementById('ado-cards');
  status.style.display = 'block';
  status.textContent = 'Fetching work items from Azure DevOps...';
  cards.innerHTML = '';
  try {
    const res = await fetch('/api/devops/workitems');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    adoItems = data.items || [];
    status.textContent = `${adoItems.length} work items fetched from ksec-devops / Ksec-Backoffice`;
    document.getElementById('ado-badge').textContent = adoItems.length;
    document.getElementById('ado-badge').style.display = adoItems.length ? '' : 'none';
    renderADOCards();
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    status.style.color = 'var(--rt)';
  }
}

async function syncADO() {
  const status = document.getElementById('ado-status');
  status.style.display = 'block';
  status.textContent = 'Syncing Azure DevOps status to tracker...';
  try {
    const res  = await fetch('/api/devops/sync', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    status.textContent = data.message;
    await load();
    toast(data.message, 'ok');
  } catch(e) {
    status.textContent = 'Sync error: ' + e.message;
    toast('Sync failed: ' + e.message, 'err');
  }
}

async function linkADOItem(projectId, workItemId, workItemTitle) {
  try {
    const res = await fetch('/api/devops/workitems', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: projectId, work_item_id: workItemId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    toast(`Linked to ADO #${workItemId}: ${workItemTitle.slice(0,40)}`, 'ok');
    await load();
    renderADOCards();
  } catch(e) {
    toast('Link failed: ' + e.message, 'err');
  }
}

function renderADOCards() {
  if (!adoItems.length) {
    document.getElementById('ado-cards').innerHTML = '<div class="empty">No work items. Click "Fetch from Azure DevOps" above.</div>';
    return;
  }
  const linkedIds = new Set(all.filter(p => p.ado_work_item_id).map(p => p.ado_work_item_id));
  document.getElementById('ado-cards').innerHTML = adoItems.map(item => {
    const stCls = 'ado-' + (item.state || '').replace(/\s/g, '');
    const isLinked = linkedIds.has(item.id);
    const linkedProject = all.find(p => p.ado_work_item_id === item.id);
    return `<div class="ado-card ${isLinked ? 'linked' : ''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <div class="ado-title">#${item.id} — ${item.title}</div>
        <span class="ado-state ${stCls}">${item.state}</span>
      </div>
      <div class="ado-meta">
        <span>${item.type}</span>
        ${item.assignee ? '<span>' + item.assignee + '</span>' : ''}
        ${item.iteration ? '<span>' + item.iteration.split('\\').pop() + '</span>' : ''}
        ${item.priority ? '<span>P' + item.priority + '</span>' : ''}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <a href="${item.url}" style="font-size:11px;color:var(--bt);text-decoration:none" target="_blank">View in Azure DevOps</a>
        ${isLinked
          ? '<span class="ado-linked-tag">Linked to: ' + (linkedProject?.project?.slice(0,35) || '') + '</span>'
          : '<div style="display:flex;gap:6px;align-items:center"><select id="link-proj-' + item.id + '" style="font-size:11px;padding:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2);max-width:160px"><option value="">Select project…</option>' +
            all.map(p => '<option value="' + p.id + '">' + p.project.slice(0,40) + '</option>').join('') +
            '</select><button class="ado-link-btn" onclick="linkFromSelect(' + item.id + ', '' + item.title.replace(/'/g, "\'").slice(0,40) + '')">Link</button></div>'
        }
      </div>
    </div>`;
  }).join('');
}

function linkFromSelect(workItemId, title) {
  const sel = document.getElementById('link-proj-' + workItemId);
  if (!sel || !sel.value) { toast('Select a project first', 'err'); return; }
  linkADOItem(parseInt(sel.value), workItemId, title);
}

// Patch nav() to handle devops
const _origNav = nav;
function nav(p) {
  document.getElementById('pg-devops')?.style && (document.getElementById('pg-devops').style.display = p === 'devops' ? '' : 'none');
  document.getElementById('n-devops')?.classList.toggle('on', p === 'devops');
  if (p !== 'devops') _origNav(p);
  else {
    ['projects','charts','summary','mc'].forEach(x => {
      document.getElementById('pg-' + x).style.display = 'none';
      document.getElementById('n-' + x)?.classList.remove('on');
    });
    document.getElementById('content').scrollTop = 0;
    curPage = 'devops';
  }
}

async function boot() {
  await load();
  document.getElementById('load').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
}
boot();
